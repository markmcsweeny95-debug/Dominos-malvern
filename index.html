<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dominos Malvern</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; }

header {
    background:#006491;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    position:sticky;
    top:0;
}

.hero {
    background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
    url("https://images.unsplash.com/photo-1513104890138-7c749659a591");
    height:160px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:22px;
}

.menu { padding:15px; }

.items {
    display:grid;
    grid-template-columns:1fr;
    gap:15px;
}

@media(min-width:700px){
    .items{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));}
}

.card {
    background:white;
    padding:10px;
    border-radius:6px;
}

.card img {
    width:100%;
    height:160px;
    object-fit:cover;
}

.price { font-weight:bold; }

button {
    width:100%;
    padding:12px;
    background:#e31837;
    color:white;
    border:none;
}

/* basket */
.overlay {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:none;
}

.overlay.show { display:block; }

.basket {
    position:fixed;
    bottom:-100%;
    left:0;
    width:100%;
    height:90%;
    background:white;
    border-radius:15px 15px 0 0;
    padding:15px;
    transition:0.3s;
    overflow-y:auto;
}

.basket.open { bottom:0; }

.close-btn { float:right; cursor:pointer; }

/* checkout */
#checkout-bar {
    position: sticky;
    bottom: 0;
    background: white;
    padding-top: 10px;
    border-top: 1px solid #ddd;
}

.pay-btn {
    width:100%;
    padding:15px;
    background:green;
    color:white;
    margin-top:10px;
}

/* loading */
#pay-overlay {
    position:fixed;
    inset:0;
    background:black;
    color:white;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

#bar-container {
    width:80%;
    height:20px;
    background:#333;
    border-radius:10px;
    margin-top:20px;
}

#bar {
    height:100%;
    width:0%;
    background:#4CAF50;
}

/* receipt */
#receipt {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:10000;
}

.receipt-card {
    width:320px;
    background:white;
    padding:20px;
    font-family:monospace;
}

</style>
</head>

<body>

<header>
    <div>Dominos Malvern</div>
    <div onclick="openBasket()">Cart (<span id="count">0</span>)</div>
</header>

<div class="hero">Order Food</div>

<div class="menu">
    <div class="items" id="menu"></div>
</div>

<div class="overlay" id="overlay" onclick="closeBasket()"></div>

<div class="basket" id="basket">
    <span class="close-btn" onclick="closeBasket()">✖</span>
    <h2>Your Basket</h2>

    <div id="basket-items"></div>

    <div id="checkout-bar">
        <input id="promoInput" placeholder="Promo code">
        <button onclick="applyPromo()">Apply</button>

        <div id="promo-list"></div>

        <div style="font-weight:bold;margin-top:10px;">
            Total: £<span id="total">0.00</span>
        </div>

        <button class="pay-btn" onclick="payNow()">Pay Now</button>
    </div>
</div>

<!-- LOADING -->
<div id="pay-overlay">
    <h2 id="pay-text">Processing payment...</h2>
    <div id="bar-container">
        <div id="bar"></div>
    </div>
</div>

<!-- RECEIPT -->
<div id="receipt">
    <div class="receipt-card">
        <h2>DOMINOS MALVERN</h2>
        <p>Cashier: Jean Allen</p>
        <p id="time"></p>
        <hr>

        <div id="receipt-items"></div>

        <hr>
        <div id="receipt-promos"></div>

        <hr>
        <p>Total: £<span id="final"></span></p>

        <p style="text-align:center;">THANK YOU 🍕</p>
    </div>
</div>

<script>

/* MENU */
let items = [
["Pepperoni",9.99,"photo-1601924582970-9238bcb495d8"],
["Margherita",8.99,"photo-1548365328-8b849e6f9f3b"],
["BBQ Chicken",10.49,"photo-1600628422019-2e6d3c7b4c1e"],
["Meat Feast",11.99,"photo-1601924638867-3ec2c3fda4c9"],
["Hawaiian",9.49,"photo-1593560708920-61dd98c46a4e"],
["Cheese Feast",7.99,"photo-1542281286-9e0a16bb7366"],
["Veggie",9.99,"photo-1540189549336-e6e99c3679fe"],
["Spicy Beef",10.99,"photo-1604908554025-1cfcbe0e6bdb"],
["Chicken Supreme",10.49,"photo-1555992336-03a23c7b20ee"],
["Garlic Pizza",6.99,"photo-1615719413546-198b25453f85"],
["Double Pepperoni",11.49,"photo-1628840042765-356cda07504e"],
["BBQ Deluxe",12.49,"photo-1594007654729-407eedc4be65"],

["Coke",2.49,"photo-1622483767028-3f66f32aef97"],
["Fanta",2.49,"photo-1580910051074-3eb694886505"],
["Sprite",2.49,"photo-1625772299848-391b6a5d6c9c"],
["Water",1.50,"photo-1559839734-2b71ea197ec2"]
];

let cart = {};
let promos = [];

let total = 0;
let percentDiscount = 0;
let fixedDiscount = 0;

/* BUILD MENU */
const menu = document.getElementById("menu");

items.forEach(p=>{
    let card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
    <img src="https://images.unsplash.com/${p[2]}">
    <h3>${p[0]}</h3>
    <div class="price">£${p[1]}</div>
    <button>Add</button>`;

    card.querySelector("button").onclick=()=>{

        if(!cart[p[0]]) cart[p[0]]={price:p[1],qty:0};

        cart[p[0]].qty++;
        total += p[1];

        updateBasket();
        updateTotal();

        document.getElementById("count").textContent =
            Object.values(cart).reduce((a,b)=>a+b.qty,0);
    };

    menu.appendChild(card);
});

/* BASKET */
function updateBasket(){
    let div=document.getElementById("basket-items");
    div.innerHTML="";

    for(let n in cart){
        let i=cart[n];

        div.innerHTML += `
        <div style="padding:6px 0;border-bottom:1px solid #eee;">
            ${n} (${i.qty}) - £${(i.qty*i.price).toFixed(2)}
        </div>`;
    }
}

/* PROMOS */
function applyPromo(){
    let code=document.getElementById("promoInput").value.toUpperCase();
    let desc="";

    if(code==="JEAN"){percentDiscount+=0.99; desc="99% off";}
    else if(code==="MATTHEW"){percentDiscount+=0.5; desc="50% off";}
    else if(code==="THOMAS"){percentDiscount+=1.01; desc="101% off";}
    else if(code==="PIGEON"){percentDiscount+=0.01; desc="1% off";}
    else if(code==="PETE-ALLEN"){fixedDiscount+=1; desc="£1 off";}
    else if(code==="JEAN-ALLEN"){fixedDiscount+=100; desc="£100 off";}

/* 🔥 NEW CODE */
    else if(code==="MARK"){percentDiscount -= 0.5; desc="-50% off (PRICE INCREASE)";}

    else return alert("Invalid code");

    promos.push(code+" → "+desc);

    document.getElementById("promo-list").innerHTML =
        promos.map(p=>`<div>${p}</div>`).join("");

    updateTotal();
}

/* TOTAL */
function updateTotal(){
    let final = total*(1-percentDiscount)-fixedDiscount;
    if(!isFinite(final)) final=0;

    document.getElementById("total").textContent =
        final < 0 ? "-" + Math.abs(final).toFixed(2) : final.toFixed(2);
}

/* PAY (10s) */
function payNow(){
    let overlay=document.getElementById("pay-overlay");
    let bar=document.getElementById("bar");

    overlay.style.display="flex";

    let p=0;

    let i=setInterval(()=>{
        p+=1;
        bar.style.width=p+"%";

        if(p>=100){
            clearInterval(i);
            overlay.style.display="none";
            showReceipt();
        }
    },100);
}

/* RECEIPT */
function showReceipt(){

    document.getElementById("receipt").style.display="flex";

    let now=new Date();
    document.getElementById("time").textContent=now.toLocaleString();

    let html="";
    for(let n in cart){
        let i=cart[n];
        html+=`${n} (${i.qty}) - £${(i.qty*i.price).toFixed(2)}<br>`;
    }

    document.getElementById("receipt-items").innerHTML=html;
    document.getElementById("receipt-promos").innerHTML=promos.join("<br>");

    let final = total*(1-percentDiscount)-fixedDiscount;

    document.getElementById("final").textContent =
        final < 0 ? "-" + Math.abs(final).toFixed(2) : final.toFixed(2);
}

/* UI */
function openBasket(){
    basket.classList.add("open");
    overlay.classList.add("show");
}

function closeBasket(){
    basket.classList.remove("open");
    overlay.classList.remove("show");
}

</script>

</body>
</html>
